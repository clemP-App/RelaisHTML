<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#2563eb" />
    <meta name="description" content="EPS Relais 12 s — enregistrer une performance sur 12 secondes." />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="EPS Relais" />
    <title>EPS Relais — Enregistrer une performance</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
    <link rel="apple-touch-icon" href="icons/icon-192.png" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body data-page="performance">
    <header class="site-header">
      <div class="site-header__inner">
        <p class="site-title">EPS <span>Relais 12 s</span></p>
        <div class="site-header__end">
          <nav class="nav-links" aria-label="Navigation principale">
            <a href="index.html">Classes</a>
            <a href="performance.html" class="is-active">Performance</a>
            <a href="bilan.html">Bilan</a>
          </nav>
        </div>
      </div>
    </header>

    <main class="app-shell">
      <h1>Enregistrer une performance (12 s)</h1>

      <div id="alert-root"></div>

      <section class="card">
        <h2 class="mt-0" data-icon="navPerf">Paramètres du relais</h2>
        <div class="form-row form-row--2">
          <div>
            <label for="class-select">Classe</label>
            <select id="class-select"></select>
          </div>
          <div>
            <label for="group-select">Groupe</label>
            <select id="group-select"></select>
          </div>
        </div>
        <div class="form-row">
          <div>
            <div id="relay-list-label" class="relay-field-label">Relais</div>
            <div id="relay-legend" class="relay-legend" aria-label="Couleurs A / B / C / D par place dans le groupe"></div>
            <input type="hidden" id="relay-value" value="" />
            <div id="relay-config-list" class="relay-pick-list" role="listbox" aria-labelledby="relay-list-label"></div>
            <div
              id="relay-choice-stats"
              class="relay-choice-stats"
              role="status"
              aria-live="polite"
              aria-label="Meilleure réalisée, cible et écart pour le binôme sélectionné"
              hidden
            ></div>
          </div>
        </div>
      </section>

      <section class="card">
        <h2 class="mt-0" data-icon="chrono">Chronométrage 12 s</h2>
        <div class="chrono-box" aria-live="polite">
          <div class="chrono-box__label">Temps écoulé</div>
          <p class="chrono-box__value" id="chrono-display">0,00 s</p>
        </div>
        <button type="button" class="btn btn--primary btn--block btn--lg" id="btn-start-chrono" data-btn-icon="play">
          Lancer le chrono 12 s
        </button>
        <div id="chrono-distance-block" style="display: none; margin-top: 1.25rem">
          <label for="chrono-distance">Distance parcourue en 12 s</label>
          <input type="number" id="chrono-distance" step="0.1" min="0" placeholder="Ex. 70.5" />
          <button type="button" class="btn btn--success btn--block" style="margin-top: 0.75rem" id="btn-save-chrono" data-btn-icon="save">
            Enregistrer cette performance
          </button>
        </div>
      </section>

      <section class="card">
        <h2 class="mt-0" data-icon="save">Saisie directe</h2>
        <label for="direct-distance">Distance réalisée sur 12 s</label>
        <input type="number" id="direct-distance" step="0.1" min="0" placeholder="Saisir la distance" />
        <button type="button" class="btn btn--primary btn--block btn--lg" style="margin-top: 0.75rem" id="btn-save-direct" data-btn-icon="save">
          Enregistrer la performance
        </button>
      </section>

      <section class="card">
        <h2 class="mt-0" data-icon="table">Historique du groupe</h2>
        <ul class="history-list" id="history-list"></ul>
        <div style="margin-top: 1.25rem">
          <h3 data-icon="chart">Évolution par binôme (1<sup>er</sup> → 2<sup>e</sup>)</h3>
          <div class="chart-perf-wrap">
            <canvas id="chart-perf" aria-label="Graphique des performances"></canvas>
          </div>
        </div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/core.js"></script>
    <script src="js/icons.js"></script>
    <script src="js/page-performance.js"></script>
    <script src="js/pwa-register.js"></script>
  </body>
</html>
